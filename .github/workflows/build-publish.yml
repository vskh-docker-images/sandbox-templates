name: Build and Push Sandbox Templates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ghcr.io/vskh-docker-images/sandbox-templates
  DOCKERHUB_IMAGE: vskhimages/sandbox-templates

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.detect.outputs.templates }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect changed templates
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '/' | cut -d'/' -f1 | sort -u)
          else
            CHANGED=$(git diff --name-only HEAD~1 | grep '/' | cut -d'/' -f1 | sort -u)
          fi

          # Filter to only directories that contain a Dockerfile
          TEMPLATES="[]"
          for dir in $CHANGED; do
            if [ -f "$dir/Dockerfile" ]; then
              TEMPLATES=$(echo "$TEMPLATES" | jq -c --arg d "$dir" '. + [$d]')
            fi
          done

          # On main branch with no detected changes (e.g., initial commit), build all templates
          if [[ "$TEMPLATES" == "[]" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            TEMPLATES=$(find . -name Dockerfile -maxdepth 2 -printf '%h\n' | sed 's|^\./||' | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi

          echo "templates=$TEMPLATES" >> "$GITHUB_OUTPUT"
          echo "Templates to build: $TEMPLATES"

  build-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.templates != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for keyless cosign signing via OIDC

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          TEMPLATE="${{ matrix.template }}"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "template=$TEMPLATE" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.template }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.template }}
            ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.template }}-${{ steps.meta.outputs.sha_short }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.template }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.template }}-${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sign both registry images using keyless signing (Sigstore/Fulcio).
      # The signature is stored in the registry alongside the image and can be
      # verified with: cosign verify --certificate-identity-regexp="..." \
      #   --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
      #   <image>@<digest>
      - name: Sign images with cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          cosign sign --yes \
            "${{ env.GHCR_IMAGE }}@${DIGEST}"
          cosign sign --yes \
            "${{ env.DOCKERHUB_IMAGE }}@${DIGEST}"
